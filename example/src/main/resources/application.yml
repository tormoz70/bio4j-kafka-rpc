spring:
  application:
    name: kafka-rpc-example

kafka-rpc:
  bootstrap-servers: localhost:9092
  server-enabled: true
  server-group-id: greeter-server
  timeout-ms: 30000
  # Number of consumer threads for request topic (server). Use > 1 to scale via partitioning. Default 1.
  # server-consumer-count: 1
  # Number of consumer threads for reply topic (client). Use > 1 to scale via partitioning. Default 1.
  # client-consumer-count: 1
  # Global producer/consumer (base for all clients and services)
  producer:
    acks: all
  consumer:
    group.id: greeter-client
  # Per-client config (key = client name, e.g. greeter for Greeter service)
  clients:
    greeter:
      request-topic: greeter.request
      reply-topic: greeter.reply
      # consumer-count: 1  # override global client-consumer-count for this client
    echo:
      request-topic: echo.request
      reply-topic: echo.reply
  # Per-service (server) config
  service:
    greeter:
      request-topic: greeter.request
      # consumer-count: 1  # override global server-consumer-count for this service
    echo:
      request-topic: echo.request
