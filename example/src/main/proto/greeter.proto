syntax = "proto3";

option java_package = "io.bio4j.kafkarpc.example";
option java_multiple_files = true;

import "google/protobuf/empty.proto";

package example.greeter;

service Greeter {
  rpc GetGreeting (GetGreetingRequest) returns (GetGreetingResponse);
  rpc SayHello (SayHelloRequest) returns (SayHelloResponse);
  rpc Notify (NotifyRequest) returns (google.protobuf.Empty);
  rpc StreamCount (StreamCountRequest) returns (StreamCountItem);
  /** Scalable stream: chunks may be distributed across partitions; order not guaranteed. */
  rpc ScalableStreamCount (StreamCountRequest) returns (StreamCountItem);
}

message GetGreetingRequest {
  string name = 1;
}

message GetGreetingResponse {
  string greeting = 1;
}

message SayHelloRequest {
  string message = 1;
}

message SayHelloResponse {
  string reply = 1;
}

message NotifyRequest {
  string event = 1;
}

message StreamCountRequest {
  int32 from = 1;
  int32 to = 2;
}

message StreamCountItem {
  int32 value = 1;
}

// Second example service
service Echo {
  rpc Echo (EchoRequest) returns (EchoResponse);
}

message EchoRequest {
  string message = 1;
}

message EchoResponse {
  string message = 1;
}
